<script>
(() => {
"use strict";

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const W = canvas.width;
const H = canvas.height;
const GROUND_Y = H - 70;

// ---------- game state ----------
const STATE = { TITLE: 0, STORY: 1, PLAYING: 2, DEAD: 3, WIN: 4 };
let state = STATE.TITLE;
let paused = false;       // game + music frozen, overlay shown
let storyTimer = 0;        // frames into the intro story scene
let farewell = null;       // mom & dad left behind as the run begins
const WIN_TIME = 60;       // survive this many seconds to reach safety (bar fills twice as fast)
let winTimer = 0;          // frames since reaching safety
let nearMisses = 0;
const floaters = [];       // floating bonus texts ("+40 NEAR MISS!")
let frame = 0;
let score = 0;
let best = Number(localStorage.getItem("trexBest") || 0);
let speed = 6;            // world scroll speed
let shake = 0;            // screen shake intensity
let elapsed = 0;          // seconds survived — drives difficulty
let stage = 1;            // bumps every 20s, escalating everything (difficulty)
let stageFlash = 0;       // frames left of the "DANGER RISING" banner
let level = 1;            // 1 = the badlands, 2 = the tsunami coast
const LEVELS = 3;
let levelFlash = 0;       // frames left of the big scenario-change banner
const LEVEL_NAMES = { 1: "· THE BADLANDS", 2: "· THE COAST", 3: "· THE LONG NIGHT" };
let warner = null;        // messenger dino that sprints past yelling RUN!
let lightning = 0;        // frames left of a lightning flash
let boltX = 0;

// ---------- input ----------
const keys = { jump: false, duck: false };
let jumpQueued = false;

addEventListener("keydown", e => {
  if (e.code === "KeyP" || e.code === "Escape") { e.preventDefault(); togglePause(); return; }
  if (paused) return;
  if (e.code === "Space" || e.code === "ArrowUp") {
    e.preventDefault();
    if (!keys.jump) jumpQueued = true;
    keys.jump = true;
    if (state !== STATE.PLAYING) advance();
  }
  if (e.code === "ArrowDown") { e.preventDefault(); keys.duck = true; }
  if (e.code === "KeyM") {
    if (!music.started) music.start();
    const on = music.toggle();
    beep(on ? 660 : 300, 0.08, "square", 0.06);
  }
});
addEventListener("keyup", e => {
  if (e.code === "Space" || e.code === "ArrowUp") keys.jump = false;
  if (e.code === "ArrowDown") keys.duck = false;
});
// touch gestures: tap = jump (hold = higher), swipe down = duck
let touch = null;
canvas.addEventListener("pointerdown", e => {
  e.preventDefault();
  if (paused) return;
  if (state !== STATE.PLAYING) {
    advance();
    jumpQueued = true;
    keys.jump = true;
    touch = { y0: e.clientY, t0: performance.now(), mode: "jump" };
    return;
  }
  // wait a beat to see if this is a tap or a downward swipe
  touch = { y0: e.clientY, t0: performance.now(), mode: null };
});
canvas.addEventListener("pointermove", e => {
  if (!touch || touch.mode) return;
  if (e.clientY - touch.y0 > 16) {
    touch.mode = "duck";
    keys.duck = true;
  }
});
function endTouch() {
  if (touch && !touch.mode) jumpQueued = true;   // quick tap, released early
  keys.jump = false;
  if (touch && touch.mode === "duck") keys.duck = false;
  touch = null;
}
canvas.addEventListener("pointerup", endTouch);
canvas.addEventListener("pointercancel", endTouch);

// ---------- pause ----------
const pauseBtn = document.getElementById("pauseBtn");
pauseBtn.addEventListener("click", () => { togglePause(); pauseBtn.blur(); });

function togglePause() {
  if (state !== STATE.PLAYING && !paused) return;   // only pausable mid-run
  paused = !paused;
  pauseBtn.textContent = paused ? "▶ Resume" : "⏸ Pause";
  // freeze/thaw the soundtrack along with the game clock
  try { if (audioCtx) paused ? audioCtx.suspend() : audioCtx.resume(); } catch (_) {}
  if (paused) {
    keys.jump = keys.duck = false;
    drawPauseOverlay();
  }
}

function drawPauseOverlay() {
  ctx.save();
  ctx.fillStyle = "rgba(0,0,0,0.6)";
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = "center";
  ctx.fillStyle = "#ffd9a0";
  ctx.font = "bold 42px 'Courier New', monospace";
  ctx.fillText("⏸ PAUSED", W / 2, H / 2 - 6);
  ctx.font = "15px 'Courier New', monospace";
  ctx.fillStyle = "#e8d3b0";
  ctx.fillText("Press P, Esc, or the button to resume", W / 2, H / 2 + 30);
  ctx.textAlign = "left";
  ctx.restore();
}

// ---------- sound (tiny synth, no assets) ----------
let audioCtx = null;
function beep(freq, dur, type = "square", vol = 0.08) {
  try {
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type;
    o.frequency.value = freq;
    g.gain.setValueAtTime(vol, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
    o.connect(g).connect(audioCtx.destination);
    o.start();
    o.stop(audioCtx.currentTime + dur);
  } catch (_) {}
}

// ---------- generative score: an original, royalty-free "epic adventure" theme ----------
// (synthesised live — no audio files, safe to monetise. Toggle with M.)
const m = n => 440 * Math.pow(2, (n - 69) / 12);   // MIDI note -> frequency
const BEATS = 16;   // a 4-bar loop in 4/4
// lush sustained pad chords: C — G — Am — F (anthemic, hopeful, a touch ominous)
const PAD = [
  { beat: 0,  notes: [60, 64, 67], dur: 4 },
  { beat: 4,  notes: [55, 59, 62], dur: 4 },
  { beat: 8,  notes: [57, 60, 64], dur: 4 },
  { beat: 12, notes: [53, 57, 60], dur: 4 },
];
// soaring lead melody arcing up and resolving back down
const LEAD = [
  { beat: 0,  n: 64, dur: 1.5 }, { beat: 1.5, n: 67, dur: 0.5 }, { beat: 2,  n: 72, dur: 2 },
  { beat: 4,  n: 71, dur: 1 },   { beat: 5,   n: 72, dur: 1 },   { beat: 6,  n: 74, dur: 2 },
  { beat: 8,  n: 72, dur: 1.5 }, { beat: 9.5, n: 71, dur: 0.5 }, { beat: 10, n: 69, dur: 2 },
  { beat: 12, n: 67, dur: 1 },   { beat: 13,  n: 69, dur: 1 },   { beat: 14, n: 67, dur: 1 }, { beat: 15, n: 64, dur: 1 },
];
// bass roots, pulsing twice a bar
const BASS = [48, 43, 45, 41].flatMap((root, i) => [
  { beat: i * 4,     n: root, dur: 1.8 },
  { beat: i * 4 + 2, n: root, dur: 1.8 },
]);

const music = {
  enabled: true, started: false, bus: null, master: null,
  beat: 0, nextTime: 0, bpm: 84, intervalId: null,

  init() {
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    this.master = audioCtx.createGain();
    this.master.gain.value = this.enabled ? 0.5 : 0;
    this.bus = audioCtx.createGain();
    this.bus.gain.value = 0.9;
    // gentle space: a feedback delay alongside the dry signal
    const delay = audioCtx.createDelay();
    delay.delayTime.value = 0.26;
    const fb = audioCtx.createGain();
    fb.gain.value = 0.26;
    const lp = audioCtx.createBiquadFilter();
    lp.type = "lowpass"; lp.frequency.value = 5200;
    this.bus.connect(lp).connect(this.master);
    lp.connect(delay); delay.connect(fb); fb.connect(delay); delay.connect(this.master);
    this.master.connect(audioCtx.destination);
  },

  start() {
    if (this.started) return;
    try {
      this.init();
      if (audioCtx.state === "suspended") audioCtx.resume();
      this.nextTime = audioCtx.currentTime + 0.1;
      this.intervalId = setInterval(() => this.schedule(), 40);
      this.started = true;
    } catch (_) {}
  },

  toggle() {
    this.enabled = !this.enabled;
    if (this.master) this.master.gain.setTargetAtTime(this.enabled ? 0.5 : 0, audioCtx.currentTime, 0.05);
    return this.enabled;
  },

  schedule() {
    if (!audioCtx) return;
    const spb = 60 / this.bpm;
    while (this.nextTime < audioCtx.currentTime + 0.25) {
      const b = ((this.beat % BEATS) + BEATS) % BEATS;
      const intense = state === STATE.PLAYING;   // drive harder mid-escape
      for (const p of PAD)  if (p.beat === b) p.notes.forEach(nt => this.pad(m(nt), this.nextTime, p.dur * spb));
      for (const l of LEAD) if (l.beat === b) this.lead(m(l.n), this.nextTime, l.dur * spb);
      for (const ba of BASS) if (ba.beat === b) this.bassHit(m(ba.n), this.nextTime, ba.dur * spb);
      // timpani: downbeats always, off-beats only while running
      if (b % 4 === 0) this.drum(this.nextTime, 0.9);
      else if (intense && b % 2 === 0) this.drum(this.nextTime, 0.5);
      this.nextTime += spb;
      this.beat++;
    }
  },

  pad(freq, t, dur) {
    for (const det of [-4, 4]) {
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.type = "sawtooth"; o.frequency.value = freq; o.detune.value = det;
      const f = audioCtx.createBiquadFilter();
      f.type = "lowpass"; f.frequency.value = 1400;
      g.gain.setValueAtTime(0.0001, t);
      g.gain.linearRampToValueAtTime(0.05, t + 0.4);            // slow swell
      g.gain.setValueAtTime(0.05, t + dur - 0.5);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      o.connect(f).connect(g).connect(this.bus);
      o.start(t); o.stop(t + dur + 0.05);
    }
  },

  lead(freq, t, dur) {
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = "triangle"; o.frequency.value = freq;
    const vib = audioCtx.createOscillator(), vg = audioCtx.createGain();
    vib.frequency.value = 5; vg.gain.value = 4; vib.connect(vg).connect(o.detune);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.linearRampToValueAtTime(0.16, t + 0.06);             // hornlike attack
    g.gain.setValueAtTime(0.13, t + dur * 0.6);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g).connect(this.bus);
    o.start(t); vib.start(t); o.stop(t + dur + 0.05); vib.stop(t + dur + 0.05);
  },

  bassHit(freq, t, dur) {
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = "triangle"; o.frequency.value = freq;
    g.gain.setValueAtTime(0.0001, t);
    g.gain.linearRampToValueAtTime(0.12, t + 0.03);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g).connect(this.bus);
    o.start(t); o.stop(t + dur + 0.05);
  },

  drum(t, vol) {
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = "sine";
    o.frequency.setValueAtTime(140, t);
    o.frequency.exponentialRampToValueAtTime(48, t + 0.18);     // pitch-drop timpani
    g.gain.setValueAtTime(vol * 0.5, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.35);
    o.connect(g).connect(this.bus);
    o.start(t); o.stop(t + 0.4);
  },
};

// ---------- T-Rex ----------
const rex = {
  x: 130,
  y: GROUND_Y,
  vy: 0,
  w: 62,
  h: 64,
  onGround: true,
  jumpHeld: 0,
  jumpBuffer: 0,
  legPhase: 0,

  reset() {
    this.y = GROUND_Y;
    this.vy = 0;
    this.onGround = true;
  },

  get ducking() { return keys.duck && this.onGround; },

  hitbox() {
    if (this.ducking) return { x: this.x - 26, y: this.y - 30, w: 60, h: 30 };
    return { x: this.x - 20, y: this.y - this.h, w: 44, h: this.h };
  },

  update() {
    // input buffering: a jump pressed a few frames before landing still counts
    if (jumpQueued) { this.jumpBuffer = 8; jumpQueued = false; }
    if (this.jumpBuffer > 0) {
      this.jumpBuffer--;
      if (this.onGround) {
        this.vy = -13.5;
        this.onGround = false;
        this.jumpHeld = 12;
        this.jumpBuffer = 0;
        beep(300, 0.12, "square");
      }
    }

    // variable jump height: holding the key sustains lift
    if (!this.onGround) {
      if (keys.jump && this.jumpHeld > 0 && this.vy < 0) {
        this.vy -= 0.45;
        this.jumpHeld--;
      }
      this.vy += keys.duck ? 1.6 : 0.8;  // fast-fall with down
      this.y += this.vy;
      if (this.y >= GROUND_Y) {
        this.y = GROUND_Y;
        this.vy = 0;
        this.onGround = true;
      }
    }
    this.legPhase += speed * 0.045;
  },

  draw() {
    const x = this.x, y = this.y;
    ctx.save();
    // shield aura
    if (shield > 0) {
      const pulse = 0.5 + 0.5 * Math.sin(frame * 0.4);
      const g = ctx.createRadialGradient(x, y - 32, 6, x, y - 32, 64);
      g.addColorStop(0, "rgba(124,252,0," + (0.3 + 0.25 * pulse) + ")");
      g.addColorStop(1, "rgba(124,252,0,0)");
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(x, y - 30, 64, 0, Math.PI * 2); ctx.fill();
    }
    ctx.fillStyle = "#4a7c3f";
    ctx.strokeStyle = "#2e5226";
    ctx.lineWidth = 2;

    if (this.ducking) {
      // low, stretched-out pose
      ctx.beginPath();
      ctx.ellipse(x, y - 16, 34, 14, 0, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();
      // head forward
      ctx.beginPath();
      ctx.ellipse(x + 38, y - 18, 16, 10, 0.1, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();
      // tail
      ctx.beginPath();
      ctx.moveTo(x - 30, y - 18);
      ctx.lineTo(x - 62, y - 26);
      ctx.lineTo(x - 30, y - 10);
      ctx.closePath();
      ctx.fill(); ctx.stroke();
      // terrified eye, clenched panicked grimace
      ctx.fillStyle = "#fff";
      ctx.beginPath(); ctx.arc(x + 42, y - 21, 5, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = "#2e5226"; ctx.lineWidth = 1.5; ctx.stroke();
      ctx.fillStyle = "#000";
      ctx.beginPath(); ctx.arc(x + 40 + Math.sin(frame * 0.25), y - 21, 1.5, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = "#2e5226"; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(x + 36, y - 28); ctx.lineTo(x + 48, y - 26); ctx.stroke();
      ctx.fillStyle = "#bfe6ff";
      ctx.beginPath(); ctx.ellipse(x + 38, y - 34 - (frame % 12), 1.8, 2.8, -0.4, 0, Math.PI * 2); ctx.fill();
      // running legs
      this.drawLegs(x - 4, y, 10);
    } else {
      // body
      ctx.beginPath();
      ctx.ellipse(x, y - 34, 24, 18, -0.25, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();
      // tail
      ctx.beginPath();
      ctx.moveTo(x - 18, y - 40);
      ctx.lineTo(x - 58, y - 54);
      ctx.lineTo(x - 16, y - 26);
      ctx.closePath();
      ctx.fill(); ctx.stroke();
      // neck + head
      ctx.beginPath();
      ctx.moveTo(x + 12, y - 44);
      ctx.quadraticCurveTo(x + 24, y - 62, x + 22, y - 66);
      ctx.lineTo(x + 34, y - 66);
      ctx.quadraticCurveTo(x + 26, y - 40, x + 18, y - 36);
      ctx.closePath();
      ctx.fill(); ctx.stroke();
      ctx.beginPath();
      ctx.ellipse(x + 34, y - 64, 17, 10, 0.12, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();
      // gaping panicked jaw
      ctx.fillStyle = "#7a1f1f";
      ctx.beginPath();
      ctx.moveTo(x + 40, y - 64);
      ctx.lineTo(x + 56, y - 68);   // upper jaw thrown open
      ctx.lineTo(x + 55, y - 50);   // lower jaw dropped
      ctx.lineTo(x + 39, y - 57);
      ctx.closePath();
      ctx.fill(); ctx.stroke();
      // teeth
      ctx.fillStyle = "#fffbe8";
      for (let tI = 0; tI < 3; tI++) {
        ctx.beginPath();
        ctx.moveTo(x + 44 + tI * 4, y - 66 + tI);
        ctx.lineTo(x + 46 + tI * 4, y - 61 + tI);
        ctx.lineTo(x + 48 + tI * 4, y - 67 + tI);
        ctx.closePath(); ctx.fill();
        ctx.beginPath();
        ctx.moveTo(x + 43 + tI * 4, y - 55 + tI * 1.5);
        ctx.lineTo(x + 45 + tI * 4, y - 59 + tI * 1.5);
        ctx.lineTo(x + 47 + tI * 4, y - 54 + tI * 1.5);
        ctx.closePath(); ctx.fill();
      }
      // terrified eye: huge white, tiny pupil darting back toward the meteor
      ctx.fillStyle = "#fff";
      ctx.beginPath(); ctx.arc(x + 33, y - 68, 6, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = "#2e5226"; ctx.lineWidth = 1.5; ctx.stroke();
      ctx.fillStyle = "#000";
      const dart = Math.sin(frame * 0.25) * 1.2; // pupil trembles
      ctx.beginPath(); ctx.arc(x + 30.5 + dart, y - 68, 1.7, 0, Math.PI * 2); ctx.fill();
      // worried brow slanted up toward the danger behind
      ctx.strokeStyle = "#2e5226"; ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.moveTo(x + 25, y - 77);
      ctx.lineTo(x + 39, y - 73);
      ctx.stroke();
      // sweat flying off the head
      ctx.fillStyle = "#bfe6ff";
      const sw = frame * 0.3;
      ctx.beginPath(); ctx.ellipse(x + 26 + Math.sin(sw) * 2, y - 82 - (frame % 14), 2, 3.2, -0.4, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(x + 44, y - 78 - ((frame + 7) % 14), 1.6, 2.6, 0.4, 0, Math.PI * 2); ctx.fill();
      // tiny arms
      ctx.strokeStyle = "#2e5226";
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(x + 14, y - 36);
      ctx.lineTo(x + 22, y - 30);
      ctx.stroke();
      ctx.lineWidth = 2;
      // legs
      this.drawLegs(x, y, 14);
    }
    ctx.restore();
  },

  drawLegs(x, y, len) {
    ctx.fillStyle = "#4a7c3f";
    ctx.strokeStyle = "#2e5226";
    ctx.lineWidth = 5;
    const swing = this.onGround ? Math.sin(this.legPhase) * 10 : 4;
    ctx.beginPath();
    ctx.moveTo(x - 6, y - len - 6);
    ctx.lineTo(x - 6 + swing, y);
    ctx.moveTo(x + 8, y - len - 6);
    ctx.lineTo(x + 8 - swing, y);
    ctx.stroke();
    ctx.lineWidth = 2;
  }
};

// ---------- debris (falling meteors + rolling boulders) ----------
let debris = [];
let spawnTimer = 0;
let rocksSinceGrass = 0;   // every 15th rock, a grass tuft drops instead-as-bonus
let shield = 0;            // rock shots the rex can still soak up (eating grass = 3)
const SHIELD_MAX = 3;

// a glowing patch of grass parachutes down for the rex to gobble
function spawnGrass() {
  debris.push({
    kind: "grass",
    x: W + 30 + Math.random() * W * 0.35,   // lands somewhere ahead, within reach
    y: -40,
    vx: -(speed * 0.55),
    vy: 2.4 + Math.random(),
    r: 18,
    spin: 0
  });
}

function spawnDebris() {
  // tally rocks; every 15th one, also drop a grass power-up
  rocksSinceGrass++;
  if (rocksSinceGrass >= 15) { rocksSinceGrass = 0; spawnGrass(); }

  const roll = Math.random();
  if (roll < 0.45) {
    // falling meteor, angled in from the right — jump or let it pass
    debris.push({
      kind: "meteor",
      x: W + 60 + Math.random() * 120,
      y: -40 - Math.random() * 100,
      vx: -(speed * 0.9 + Math.random() * 3),
      vy: 4.5 + Math.random() * 3 + speed * 0.15,
      r: 14 + Math.random() * 14,
      spin: Math.random() * Math.PI * 2
    });
  } else if (roll < 0.75) {
    // ground boulder — jump over it
    const r = 16 + Math.random() * 16;
    debris.push({
      kind: "boulder",
      x: W + 40,
      y: GROUND_Y - r,
      vx: -speed * (1.05 + Math.random() * 0.25),
      vy: 0,
      r,
      spin: 0
    });
  } else {
    // low-flying flaming chunk — duck under it
    debris.push({
      kind: "flyer",
      x: W + 40,
      y: GROUND_Y - 52 - Math.random() * 14,
      vx: -speed * (1.5 + Math.random() * 0.4),
      vy: 0,
      r: 15,
      spin: 0
    });
  }
}

const particles = [];
function burst(x, y, n, baseColor) {
  for (let i = 0; i < n; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 8,
      vy: -Math.random() * 7,
      life: 25 + Math.random() * 20,
      r: 2 + Math.random() * 4,
      c: baseColor
    });
  }
}

function updateDebris() {
  spawnTimer--;
  if (spawnTimer <= 0) {
    spawnDebris();
    // from stage 3 on, debris starts arriving in pairs more and more often
    if (stage >= 3 && Math.random() < 0.12 + stage * 0.05) spawnDebris();
    // spawn window shrinks with both speed and stage
    spawnTimer = Math.max(20, 95 - speed * 5 - stage * 4) + Math.random() * Math.max(12, 40 - stage * 3);
  }
  // stage 4+: random meteor showers on top of the normal pattern
  if (stage >= 4 && Math.random() < 0.0012 * stage) {
    for (let i = 0; i < 3; i++) {
      debris.push({
        kind: "meteor",
        x: W * 0.4 + Math.random() * W * 0.8,
        y: -40 - Math.random() * 180,
        vx: -(speed * 0.6 + Math.random() * 3),
        vy: 5 + Math.random() * 4 + speed * 0.15,
        r: 10 + Math.random() * 12,
        spin: Math.random() * Math.PI * 2
      });
    }
  }

  const hb = rex.hitbox();
  for (let i = debris.length - 1; i >= 0; i--) {
    const d = debris[i];
    d.x += d.vx;
    d.y += d.vy;
    d.spin += 0.15;

    // grass tuft: harmless treat — settles on the ground, scrolls past, eatable
    if (d.kind === "grass") {
      if (d.y + d.r >= GROUND_Y) { d.y = GROUND_Y - d.r; d.vy = 0; d.vx = -speed; }
      const gx = Math.max(hb.x, Math.min(d.x, hb.x + hb.w));
      const gy = Math.max(hb.y, Math.min(d.y, hb.y + hb.h));
      if ((d.x - gx) ** 2 + (d.y - gy) ** 2 < (d.r + 6) ** 2) {
        shield = SHIELD_MAX;   // can now soak up 3 rock shots
        burst(d.x, d.y, 24, "#7CFC00");
        floaters.push({ x: rex.x + 40, y: rex.y - 95, txt: "★ SHIELD x" + SHIELD_MAX + "!", life: 60 });
        beep(660, 0.08, "square", 0.08);
        setTimeout(() => beep(880, 0.13, "square", 0.08), 80);
        debris.splice(i, 1);
        continue;
      }
      if (d.x < -80) debris.splice(i, 1);
      continue;   // never harms the rex
    }

    // meteor strikes the ground: explosion + shockwave shake, leaves a hazard briefly
    if (d.kind === "meteor" && d.y + d.r >= GROUND_Y) {
      burst(d.x, GROUND_Y, 26, "#ff8c2e");
      shake = Math.min(14, 6 + d.r * 0.3);
      beep(70, 0.3, "sawtooth", 0.12);
      debris.splice(i, 1);
      continue;
    }
    if (d.x < -80) { debris.splice(i, 1); continue; }

    // circle-vs-rect collision
    const cx = Math.max(hb.x, Math.min(d.x, hb.x + hb.w));
    const cy = Math.max(hb.y, Math.min(d.y, hb.y + hb.h));
    const hitR = d.r * 0.82; // slight forgiveness
    const distSq = (d.x - cx) ** 2 + (d.y - cy) ** 2;
    if (distSq < hitR * hitR) {
      if (shield > 0) {
        // shield absorbs the hit — one of the 3 charges is spent
        shield--;
        burst(d.x, d.y, 18, "#ff8c2e");
        shake = Math.max(shake, 6);
        score += 15;
        floaters.push({ x: rex.x + 40, y: rex.y - 95,
          txt: shield > 0 ? "BLOCKED! (" + shield + " left)" : "SHIELD DOWN!", life: 45 });
        beep(shield > 0 ? 200 : 140, 0.08, "square", 0.07);
        debris.splice(i, 1);
        continue;
      }
      gameOver();
      return;
    }
    // grazed it — worth bonus points once it's safely past
    if (distSq < (hitR + 26) ** 2) d.near = true;
    if (d.near && !d.scored && d.x + d.r < hb.x) {
      d.scored = true;
      nearMisses++;
      score += 40;
      floaters.push({ x: rex.x + 40, y: rex.y - 95, txt: "+40 NEAR MISS!", life: 50 });
      beep(720, 0.07, "triangle", 0.06);
    }
  }

  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx - speed * 0.5;
    p.y += p.vy;
    p.vy += 0.3;
    p.life--;
    if (p.life <= 0 || p.y > GROUND_Y + 10) particles.splice(i, 1);
  }
}

function drawDebris() {
  for (const d of debris) {
    ctx.save();
    ctx.translate(d.x, d.y);
    ctx.rotate(d.spin);
    if (d.kind === "grass") {
      ctx.rotate(-d.spin);   // keep the tuft upright as it drifts
      if (level === 3) {
        // a glowing ember / little campfire — warmth against the freezing dark
        const gl = ctx.createRadialGradient(0, 0, 2, 0, 0, d.r + 14);
        gl.addColorStop(0, "rgba(255,170,60," + (0.55 + 0.25 * Math.sin(frame * 0.2)) + ")");
        gl.addColorStop(1, "rgba(255,120,30,0)");
        ctx.fillStyle = gl;
        ctx.beginPath(); ctx.arc(0, 0, d.r + 14, 0, Math.PI * 2); ctx.fill();
        // charred log
        ctx.fillStyle = "#3a261a";
        ctx.beginPath(); ctx.ellipse(0, 8, d.r * 0.85, d.r * 0.4, 0, 0, Math.PI * 2); ctx.fill();
        // licking flames
        ctx.fillStyle = "rgba(255,150,40,0.9)";
        for (let b = -1; b <= 1; b++) {
          const fh = d.r * (0.9 + 0.3 * Math.sin(frame * 0.3 + b));
          ctx.beginPath();
          ctx.moveTo(b * 7 - 4, 6);
          ctx.quadraticCurveTo(b * 7, 6 - fh, b * 7 + 3, 6 - fh * 1.3);
          ctx.quadraticCurveTo(b * 7 + 5, 6 - fh, b * 7 + 4, 6);
          ctx.closePath(); ctx.fill();
        }
        ctx.restore();
        continue;
      }
      // soft pulsing glow so it reads as a power-up
      const gl = ctx.createRadialGradient(0, 0, 2, 0, 0, d.r + 12);
      gl.addColorStop(0, "rgba(160,255,80," + (0.45 + 0.2 * Math.sin(frame * 0.2)) + ")");
      gl.addColorStop(1, "rgba(160,255,80,0)");
      ctx.fillStyle = gl;
      ctx.beginPath(); ctx.arc(0, 0, d.r + 12, 0, Math.PI * 2); ctx.fill();
      // little clump of soil
      ctx.fillStyle = "#5a3a22";
      ctx.beginPath(); ctx.ellipse(0, 7, d.r * 0.8, d.r * 0.42, 0, 0, Math.PI * 2); ctx.fill();
      // waving blades
      ctx.strokeStyle = "#4caf2e"; ctx.lineWidth = 3; ctx.lineCap = "round";
      for (let b = -2; b <= 2; b++) {
        ctx.beginPath();
        ctx.moveTo(b * 5, 7);
        ctx.quadraticCurveTo(b * 6 + Math.sin(frame * 0.1 + b) * 3, -8, b * 7, -d.r);
        ctx.stroke();
      }
      ctx.lineCap = "butt"; ctx.lineWidth = 2;
      ctx.restore();
      continue;
    }
    if (d.kind === "meteor" || d.kind === "flyer") {
      // fire trail
      const grad = ctx.createLinearGradient(0, 0, d.r * 3.2, -d.r * (d.kind === "meteor" ? -2.2 : 0.4));
      grad.addColorStop(0, level === 3 ? "rgba(200,235,255,0.85)" : "rgba(255,200,60,0.85)");
      grad.addColorStop(1, level === 3 ? "rgba(120,180,230,0)" : "rgba(255,60,0,0)");
      ctx.rotate(-d.spin);
      ctx.fillStyle = grad;
      ctx.beginPath();
      const tx = -d.vx * 5, ty = -d.vy * 5;
      ctx.moveTo(0, -d.r * 0.6);
      ctx.lineTo(tx, ty);
      ctx.lineTo(0, d.r * 0.6);
      ctx.closePath();
      ctx.fill();
      ctx.rotate(d.spin);
    }
    // rock body — icebound in the long night
    ctx.fillStyle = level === 3
      ? (d.kind === "boulder" ? "#9fb8c4" : "#bcd6e2")
      : (d.kind === "boulder" ? "#6b5444" : "#54382a");
    ctx.beginPath();
    for (let a = 0; a < 7; a++) {
      const ang = (a / 7) * Math.PI * 2;
      const rr = d.r * (0.85 + 0.18 * Math.sin(a * 3.1));
      ctx.lineTo(Math.cos(ang) * rr, Math.sin(ang) * rr);
    }
    ctx.closePath();
    ctx.fill();
    if (d.kind !== "boulder") {
      ctx.fillStyle = level === 3 ? "rgba(220,245,255,0.6)" : "rgba(255,140,30,0.55)";
      ctx.beginPath();
      ctx.arc(d.r * 0.3, -d.r * 0.2, d.r * 0.45, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.life / 40);
    ctx.fillStyle = p.c;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ---------- background: doom sky, the big meteor, palms, ground ----------

for (let i = 0; i < 6; i++) {

}
let groundScroll = 0;

// pterosaurs fleeing across the sky

  });

// small dinosaurs stampeding alongside in the background

function drawAsh(t) {
  for (const a of ash) {
    a.y += a.vy;
    a.x += Math.sin(t * 0.02 + a.sway) * 0.5 - speed * 0.12;
    if (a.y > H) {
      a.y = -8;
      a.x = Math.random() * W;
      // as stages climb, more of the ash is burning
      a.ember = Math.random() < 0.18 + Math.min(0.45, (stage - 1) * 0.09);
      a.vy = (0.4 + Math.random() * 0.9) * (1 + (stage - 1) * 0.12);
    }
    if (a.x < -8) a.x = W + 8;
    if (level === 3) {
      ctx.fillStyle = "rgba(228,238,248,0.8)";   // ash turns to snow in the long night
    } else if (a.ember) {
      ctx.fillStyle = "rgba(255," + (110 + Math.floor(80 * Math.abs(Math.sin(t * 0.1 + a.sway)))) + ",30,0.9)";
    } else {
      ctx.fillStyle = "rgba(200,190,180,0.45)";
    }
    ctx.beginPath();
    ctx.arc(a.x, a.y, a.s, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawPterosaurs(t) {
  ctx.strokeStyle = "rgba(35,18,14,0.9)";
  ctx.lineWidth = 2.5;
  for (const p of pterosaurs) {
    p.x += p.v - speed * 0.15;
    p.y += Math.sin(t * 0.03 + p.flap) * 0.4;
    if (p.x > W + 60) { p.x = -60; p.y = 40 + Math.random() * 110; }
    if (p.x < -80) p.x = W + 60;
    const wing = Math.sin(t * 0.18 + p.flap) * p.size * 0.8;
    ctx.beginPath();
    ctx.moveTo(p.x - p.size, p.y - wing);
    ctx.quadraticCurveTo(p.x - p.size * 0.3, p.y, p.x, p.y);
    ctx.quadraticCurveTo(p.x + p.size * 0.3, p.y, p.x + p.size, p.y - wing);
    ctx.stroke();
    // crest + beak silhouette
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
    ctx.lineTo(p.x + p.size * 0.55, p.y + 2);
    ctx.stroke();
  }
}

function drawHerd(t) {
  ctx.fillStyle = "rgba(48,30,20,0.85)";
  for (const d of herd) {
    d.x += d.v - speed * 0.55;
    d.gait += 0.3;
    if (d.x < -40) { d.x = W + 40; d.size = 8 + Math.random() * 7; d.v = 0.5 + Math.random() * 1.2; }
    const bob = Math.abs(Math.sin(d.gait)) * 3;
    const gy = GROUND_Y - bob;
    const s = d.size;
    // little running silhouette: body, neck, tail, scissoring legs
    ctx.beginPath();
    ctx.ellipse(d.x, gy - s, s, s * 0.55, -0.1, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(d.x + s * 0.7, gy - s * 1.2);
    ctx.lineTo(d.x + s * 1.4, gy - s * 1.9);
    ctx.lineTo(d.x + s * 1.7, gy - s * 1.6);
    ctx.lineTo(d.x + s * 0.8, gy - s * 0.7);
    ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(d.x - s * 0.8, gy - s);
    ctx.lineTo(d.x - s * 2, gy - s * 1.5);
    ctx.lineTo(d.x - s * 0.7, gy - s * 0.6);
    ctx.closePath(); ctx.fill();
    const leg = Math.sin(d.gait) * s * 0.6;
    ctx.strokeStyle = "rgba(48,30,20,0.85)";
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(d.x - s * 0.3, gy - s * 0.6); ctx.lineTo(d.x - s * 0.3 + leg, GROUND_Y);
    ctx.moveTo(d.x + s * 0.3, gy - s * 0.6); ctx.lineTo(d.x + s * 0.3 - leg, GROUND_Y);
    ctx.stroke();
  }
}

// foreground ferns whipping past
const ferns = [];
for (let i = 0; i < 5; i++) ferns.push({ x: Math.random() * W, s: 14 + Math.random() * 16 });

function drawFerns(t) {
  for (const f of ferns) {
    f.x -= speed * (state === STATE.PLAYING ? 1.15 : 0.2);
    if (f.x < -40) { f.x = W + 40; f.s = 14 + Math.random() * 16; }
    ctx.strokeStyle = "#324a22";
    ctx.lineWidth = 2;
    for (let a = -2; a <= 2; a++) {
      const lean = a * 0.4 + Math.sin(t * 0.05 + f.x) * 0.12;
      ctx.beginPath();
      ctx.moveTo(f.x, GROUND_Y + 6);
      ctx.quadraticCurveTo(f.x + lean * f.s * 0.6, GROUND_Y - f.s * 0.7, f.x + lean * f.s, GROUND_Y - f.s);
      ctx.stroke();
    }
  }
}

function drawBackground(t) {
  if (level === 3) drawBackgroundWinter(t);
  else if (level === 2) drawBackgroundOcean(t);
  else drawBackgroundLand(t);
}

// ---- shared apocalypse elements (drawn in both scenes) ----
function drawStormLightning(t) {
  // lightning rips through the ash clouds from stage 3 on
  if (state === STATE.PLAYING && stage >= 3 && lightning <= 0 && Math.random() < 0.0015 + stage * 0.0008) {
    lightning = 10;
    boltX = W * 0.3 + Math.random() * W * 0.65;
    beep(55, 0.45, "sawtooth", 0.11);
  }
  if (lightning > 0) {
    lightning--;
    ctx.fillStyle = "rgba(255,240,215," + (lightning / 10) * 0.22 + ")";
    ctx.fillRect(0, 0, W, GROUND_Y);
    if (lightning > 4) {
      ctx.strokeStyle = "rgba(255,250,230,0.9)";
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      let lx = boltX, ly = 0;
      ctx.moveTo(lx, ly);
      while (ly < GROUND_Y - 20) {
        lx += (Math.random() - 0.5) * 46;
        ly += 28 + Math.random() * 26;
        ctx.lineTo(lx, ly);
      }
      ctx.stroke();
    }
  }
}

function drawDoomMeteor(t) {
  // THE meteorite — looming behind you on the left horizon, slowly growing
  const grow = Math.min(1, elapsed / WIN_TIME);  // the asteroid closes in across the stage
  const mx = 110 - grow * 30;
  const my = 90 + grow * 40;
  const mr = 34 + grow * 46;
  const glow = ctx.createRadialGradient(mx, my, mr * 0.2, mx, my, mr * 3.4);
  glow.addColorStop(0, "rgba(255,230,150,0.95)");
  glow.addColorStop(0.35, "rgba(255,120,30,0.5)");
  glow.addColorStop(1, "rgba(255,60,0,0)");
  ctx.fillStyle = glow;
  ctx.fillRect(mx - mr * 3.5, my - mr * 3.5, mr * 7, mr * 7);
  ctx.fillStyle = "#3a2218";
  ctx.beginPath();
  ctx.arc(mx, my, mr, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = "rgba(255,180,60,0.85)";
  ctx.beginPath();
  ctx.arc(mx + mr * 0.3, my + mr * 0.25, mr * 0.55, 0, Math.PI * 2);
  ctx.fill();
  // its fiery tail streaking up-left
  ctx.strokeStyle = "rgba(255,160,40,0.35)";
  for (let i = 0; i < 5; i++) {
    ctx.lineWidth = 3 + i;
    ctx.beginPath();
    ctx.moveTo(mx - mr * 0.6, my - mr * 0.6);
    ctx.quadraticCurveTo(mx - 80 - i * 18, my - 70 - i * 12, mx - 160 - i * 30, my - 60 - i * 20);
    ctx.stroke();
  }
}

// ---- STAGE 1: the burning badlands ----
function drawBackgroundLand(t) {
  // apocalyptic gradient sky
  const sky = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  sky.addColorStop(0, "#2b0f1e");
  sky.addColorStop(0.45, "#7a2410");
  sky.addColorStop(0.8, "#d96a1f");
  sky.addColorStop(1, "#f4a23c");
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, GROUND_Y);

  // each stage stains the sky darker and bloodier
  const violence = Math.min(1, (stage - 1) / 5);
  if (violence > 0) {
    ctx.fillStyle = "rgba(55,0,8," + (violence * 0.38) + ")";
    ctx.fillRect(0, 0, W, GROUND_Y);
  }

  drawStormLightning(t);
  drawDoomMeteor(t);

  // fires burning along the horizon — more of the world burns each stage
  const nFires = 4 + Math.min(8, (stage - 1) * 2);
  for (let i = 0; i < nFires; i++) {
    const fx = ((i * (W + 160) / nFires + 90 - t * (0.5 + violence)) % (W + 160)) - 80;
    const flick = 0.6 + 0.4 * Math.sin(t * 0.13 + i * 2.7);
    const fire = ctx.createRadialGradient(fx, GROUND_Y - 4, 2, fx, GROUND_Y - 4, 34 * flick);
    fire.addColorStop(0, "rgba(255,210,90," + (0.55 * flick) + ")");
    fire.addColorStop(1, "rgba(255,80,0,0)");
    ctx.fillStyle = fire;
    ctx.fillRect(fx - 40, GROUND_Y - 44, 80, 44);
    ctx.fillStyle = "rgba(255,160,40," + (0.5 * flick) + ")";
    ctx.beginPath();
    ctx.moveTo(fx - 8, GROUND_Y);
    ctx.quadraticCurveTo(fx - 6, GROUND_Y - 14 * flick, fx, GROUND_Y - 22 * flick);
    ctx.quadraticCurveTo(fx + 6, GROUND_Y - 12 * flick, fx + 8, GROUND_Y);
    ctx.closePath();
    ctx.fill();
  }

  // distant smoke columns
  ctx.fillStyle = "rgba(60,30,25,0.5)";
  for (let i = 0; i < 3; i++) {
    const sx = ((i * 320 + 150 - t * 0.3) % (W + 200)) - 100;
    ctx.beginPath();
    ctx.ellipse(sx, GROUND_Y - 60, 26, 60 + 14 * Math.sin(t * 0.01 + i), 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // wildlife fleeing the blast
  drawPterosaurs(t);

  // parallax palm trees
  for (const p of palms) {
    p.x -= speed * p.layer * (state === STATE.PLAYING ? 1 : 0.2);
    if (p.x < -40) { p.x = W + 40; p.h = 50 + Math.random() * 50; }
    const px = p.x, base = GROUND_Y, top = base - p.h;
    ctx.strokeStyle = p.layer < 0.5 ? "#4d2c18" : "#3a1f10";
    ctx.lineWidth = p.layer < 0.5 ? 4 : 6;
    ctx.beginPath();
    ctx.moveTo(px, base);
    ctx.quadraticCurveTo(px + 8, base - p.h * 0.6, px, top);
    ctx.stroke();
    ctx.lineWidth = 3;
    for (let a = 0; a < 5; a++) {
      const ang = -Math.PI * 0.85 + a * 0.35;
      ctx.beginPath();
      ctx.moveTo(px, top);
      ctx.quadraticCurveTo(
        px + Math.cos(ang) * 26, top + Math.sin(ang) * 18 - 8,
        px + Math.cos(ang) * 42, top + Math.sin(ang) * 30
      );
      ctx.stroke();
    }
  }

  // ground
  const gnd = ctx.createLinearGradient(0, GROUND_Y, 0, H);
  gnd.addColorStop(0, "#7a5230");
  gnd.addColorStop(1, "#402a16");
  ctx.fillStyle = gnd;
  ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
  ctx.strokeStyle = "#2e1d0e";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, GROUND_Y);
  ctx.lineTo(W, GROUND_Y);
  ctx.stroke();

  // scrolling ground cracks
  groundScroll = (groundScroll + (state === STATE.PLAYING ? speed : 1)) % 90;
  for (let gx = -groundScroll; gx < W; gx += 90) {
    // from stage 2 the cracks glow with magma welling up
    if (stage >= 2) {
      const pulse = 0.6 + 0.4 * Math.sin(t * 0.07 + gx * 0.05);
      ctx.strokeStyle = "rgba(255,90,15," + ((0.25 + 0.55 * violence) * pulse) + ")";
      ctx.lineWidth = 5;
      ctx.beginPath();
      ctx.moveTo(gx, GROUND_Y + 14);
      ctx.lineTo(gx + 24, GROUND_Y + 26);
      ctx.lineTo(gx + 12, GROUND_Y + 42);
      ctx.stroke();
    }
    ctx.strokeStyle = "rgba(40,24,10,0.8)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(gx, GROUND_Y + 14);
    ctx.lineTo(gx + 24, GROUND_Y + 26);
    ctx.lineTo(gx + 12, GROUND_Y + 42);
    ctx.stroke();
  }

  // stampeding background dinos and foreground ferns
  drawHerd(t);
  drawFerns(t);
}

// ---- STAGE 2: the drowning coast, a tsunami at your back ----
function drawBackgroundOcean(t) {
  // dark storm sky over a drowning world
  const sky = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  sky.addColorStop(0, "#070b16");
  sky.addColorStop(0.45, "#142433");
  sky.addColorStop(0.78, "#2c4150");
  sky.addColorStop(1, "#7a4a28");   // distant firelit haze on the horizon
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, GROUND_Y);

  // the apocalypse keeps darkening the sky
  const violence = Math.min(1, (stage - 1) / 5);
  if (violence > 0) {
    ctx.fillStyle = "rgba(6,10,24," + (violence * 0.45) + ")";
    ctx.fillRect(0, 0, W, GROUND_Y);
  }

  drawStormLightning(t);
  drawDoomMeteor(t);

  // driving rain streaks
  ctx.strokeStyle = "rgba(170,195,215,0.18)";
  ctx.lineWidth = 1;
  for (let i = 0; i < 60; i++) {
    const rx = (i * 53 + t * 9) % (W + 40) - 20;
    const ry = (i * 71 + t * 16) % GROUND_Y;
    ctx.beginPath();
    ctx.moveTo(rx, ry);
    ctx.lineTo(rx - 4, ry + 14);
    ctx.stroke();
  }

  // pterosaurs still fleeing overhead
  drawPterosaurs(t);

  // THE TSUNAMI — a towering wall of black water rising behind you as you run
  const grow = Math.min(1, elapsed / WIN_TIME);
  const crestY = GROUND_Y - 60 - grow * 150;
  const waveAt = x => crestY + Math.sin(t * 0.03 + x * 0.012) * 16 + Math.sin(t * 0.07 + x * 0.03) * 6;
  const wave = ctx.createLinearGradient(0, crestY, 0, GROUND_Y);
  wave.addColorStop(0, "#1d5570");
  wave.addColorStop(0.5, "#0d3046");
  wave.addColorStop(1, "#04141f");
  ctx.fillStyle = wave;
  ctx.beginPath();
  ctx.moveTo(0, GROUND_Y);
  for (let x = 0; x <= W; x += 24) ctx.lineTo(x, waveAt(x));
  ctx.lineTo(W, GROUND_Y);
  ctx.closePath();
  ctx.fill();
  // curling highlight down the wave face
  ctx.strokeStyle = "rgba(120,190,220,0.4)";
  ctx.lineWidth = 6;
  ctx.beginPath();
  for (let x = 0; x <= W; x += 24) (x === 0 ? ctx.moveTo : ctx.lineTo).call(ctx, x, waveAt(x) + 22);
  ctx.stroke();
  // foaming white crest
  ctx.strokeStyle = "rgba(230,248,255,0.85)";
  ctx.lineWidth = 4;
  ctx.beginPath();
  for (let x = 0; x <= W; x += 24) (x === 0 ? ctx.moveTo : ctx.lineTo).call(ctx, x, waveAt(x));
  ctx.stroke();
  // spray flecks blown off the crest
  ctx.fillStyle = "rgba(230,248,255,0.5)";
  for (let i = 0; i < 22; i++) {
    const fx = (i * 47 + t * 1.5) % W;
    const fy = waveAt(fx) - ((t * 1.3 + i * 30) % 40);
    ctx.beginPath();
    ctx.arc(fx, fy, 1.6, 0, Math.PI * 2);
    ctx.fill();
  }

  // flooded foreshore the rex sprints across
  const gnd = ctx.createLinearGradient(0, GROUND_Y, 0, H);
  gnd.addColorStop(0, "#26424d");
  gnd.addColorStop(1, "#0a1a22");
  ctx.fillStyle = gnd;
  ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
  // firelit reflection shimmering on the wet sand
  ctx.fillStyle = "rgba(255,140,40," + (0.05 + 0.04 * Math.sin(t * 0.1)) + ")";
  ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
  ctx.strokeStyle = "#06121a";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, GROUND_Y);
  ctx.lineTo(W, GROUND_Y);
  ctx.stroke();
  // scrolling foam lines washing across the shore
  groundScroll = (groundScroll + (state === STATE.PLAYING ? speed : 1)) % 90;
  ctx.strokeStyle = "rgba(200,230,240,0.35)";
  ctx.lineWidth = 2;
  for (let gx = -groundScroll; gx < W; gx += 90) {
    ctx.beginPath();
    ctx.moveTo(gx, GROUND_Y + 16);
    ctx.quadraticCurveTo(gx + 22, GROUND_Y + 12, gx + 45, GROUND_Y + 20);
    ctx.quadraticCurveTo(gx + 68, GROUND_Y + 28, gx + 90, GROUND_Y + 22);
    ctx.stroke();
  }

  // foreground flotsam bobbing past
  for (const wk of wreckage) {
    wk.x -= speed * wk.layer * (state === STATE.PLAYING ? 1 : 0.2);
    if (wk.x < -50) { wk.x = W + 50; wk.h = 16 + Math.random() * 26; }
    const by = GROUND_Y + 10 + Math.sin(t * 0.05 + wk.bob) * 3;
    ctx.save();
    ctx.translate(wk.x, by);
    ctx.rotate(Math.sin(t * 0.03 + wk.bob) * 0.12);
    ctx.fillStyle = wk.layer < 0.6 ? "#4a3320" : "#2c1e12";
    ctx.fillRect(-wk.h / 2, -4, wk.h, 7);
    ctx.strokeStyle = "#1a1109";
    ctx.lineWidth = 1;
    ctx.strokeRect(-wk.h / 2, -4, wk.h, 7);
    ctx.restore();
  }
}

// the freezing dark — a wall of starless cold rolling in from behind you
function drawDoomDarkness(t) {
  const grow = Math.min(1, elapsed / WIN_TIME);
  const wallW = 120 + grow * 330;   // the dark swallows more of the world as you run
  const g = ctx.createLinearGradient(0, 0, wallW, 0);
  g.addColorStop(0, "rgba(0,0,0,0.95)");
  g.addColorStop(0.6, "rgba(2,4,10,0.7)");
  g.addColorStop(1, "rgba(2,4,10,0)");
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, wallW, H);
  // cold tendrils curling off the leading edge
  ctx.strokeStyle = "rgba(120,150,190,0.25)";
  ctx.lineWidth = 2;
  for (let i = 0; i < 6; i++) {
    const ty = (i + 0.5) * (H / 6);
    const reach = wallW + Math.sin(t * 0.04 + i * 1.7) * 30;
    ctx.beginPath();
    ctx.moveTo(wallW - 40, ty);
    ctx.quadraticCurveTo(reach, ty - 18, reach + 24, ty + 10);
    ctx.stroke();
  }
  // frost sparkles drifting inside the dark
  ctx.fillStyle = "rgba(180,210,240,0.6)";
  for (let i = 0; i < 14; i++) {
    const fx = (i * 31 + t * 0.6) % wallW;
    const fy = (i * 67 + t * 1.1) % H;
    ctx.fillRect(fx, fy, 1.5, 1.5);
  }
}

// ---- STAGE 3: the long night, the world freezing in the dark ----
function drawBackgroundWinter(t) {
  // sunless sky — near-black, a dying ember-scar bleeding along the horizon
  const sky = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  sky.addColorStop(0, "#05060a");
  sky.addColorStop(0.5, "#0c1018");
  sky.addColorStop(0.82, "#1a1c24");
  sky.addColorStop(1, "#3a2418");
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, GROUND_Y);

  // the dark only deepens as the stage wears on
  const violence = Math.min(1, (stage - 1) / 5);
  if (violence > 0) {
    ctx.fillStyle = "rgba(0,0,0," + (violence * 0.4) + ")";
    ctx.fillRect(0, 0, W, GROUND_Y);
  }

  // faint frozen stars flickering through the ash
  ctx.fillStyle = "rgba(200,220,245,0.6)";
  for (let i = 0; i < 30; i++) {
    const sx = (i * 137.5) % W;
    const sy = (i * 53) % (GROUND_Y * 0.6);
    ctx.globalAlpha = (0.3 + 0.7 * Math.abs(Math.sin(t * 0.05 + i))) * 0.6;
    ctx.fillRect(sx, sy, 1.6, 1.6);
  }
  ctx.globalAlpha = 1;

  drawStormLightning(t);
  drawDoomDarkness(t);

  // a last few pterosaurs still aloft
  drawPterosaurs(t);

  // parallax: bare, frost-rimed dead trees instead of palms
  for (const p of palms) {
    p.x -= speed * p.layer * (state === STATE.PLAYING ? 1 : 0.2);
    if (p.x < -40) { p.x = W + 40; p.h = 50 + Math.random() * 50; }
    const px = p.x, base = GROUND_Y, top = base - p.h;
    ctx.strokeStyle = p.layer < 0.5 ? "#2a2f38" : "#1c2028";
    ctx.lineWidth = p.layer < 0.5 ? 4 : 6;
    ctx.beginPath();
    ctx.moveTo(px, base);
    ctx.lineTo(px, top);
    ctx.stroke();
    ctx.lineWidth = 2;
    for (let a = 0; a < 4; a++) {
      const dir = a % 2 === 0 ? 1 : -1;
      const by = top + a * (p.h / 5) + 6;
      ctx.beginPath();
      ctx.moveTo(px, by);
      ctx.lineTo(px + dir * (14 + a * 3), by - 10 - a * 2);
      ctx.stroke();
    }
  }

  // frozen tundra ground
  const gnd = ctx.createLinearGradient(0, GROUND_Y, 0, H);
  gnd.addColorStop(0, "#cdd6de");
  gnd.addColorStop(1, "#7e8a93");
  ctx.fillStyle = gnd;
  ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
  ctx.strokeStyle = "#5a646c";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, GROUND_Y);
  ctx.lineTo(W, GROUND_Y);
  ctx.stroke();

  // scrolling frost cracks (the old magma cracks, frozen over)
  groundScroll = (groundScroll + (state === STATE.PLAYING ? speed : 1)) % 90;
  ctx.strokeStyle = "rgba(150,180,200,0.7)";
  ctx.lineWidth = 2;
  for (let gx = -groundScroll; gx < W; gx += 90) {
    ctx.beginPath();
    ctx.moveTo(gx, GROUND_Y + 14);
    ctx.lineTo(gx + 24, GROUND_Y + 26);
    ctx.lineTo(gx + 12, GROUND_Y + 42);
    ctx.stroke();
  }

  // the last stragglers of the herd, stumbling on through the cold
  drawHerd(t);
}

// ---------- the RUN! messenger dino ----------
function updateWarner() {
  if (!warner) return;
  warner.x += speed * 0.7 + 5;   // it overtakes even you — bad sign
  warner.gait += 0.5;
  if (warner.x > W + 160) warner = null;
}

function drawWarner() {
  if (!warner) return;
  const x = warner.x;
  const bob = Math.abs(Math.sin(warner.gait)) * 4;
  const y = GROUND_Y - bob;
  ctx.save();
  ctx.fillStyle = "#b07840";
  ctx.strokeStyle = "#6e4520";
  ctx.lineWidth = 2;
  // small raptor at full sprint, body stretched flat
  ctx.beginPath();
  ctx.ellipse(x, y - 22, 20, 9, -0.08, 0, Math.PI * 2);
  ctx.fill(); ctx.stroke();
  // tail straight out behind for balance
  ctx.beginPath();
  ctx.moveTo(x - 16, y - 25);
  ctx.lineTo(x - 46, y - 30);
  ctx.lineTo(x - 15, y - 18);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  // neck + head craned forward
  ctx.beginPath();
  ctx.moveTo(x + 14, y - 28);
  ctx.quadraticCurveTo(x + 22, y - 36, x + 28, y - 36);
  ctx.lineTo(x + 30, y - 30);
  ctx.quadraticCurveTo(x + 22, y - 26, x + 15, y - 22);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(x + 33, y - 35, 10, 6, 0.15, 0, Math.PI * 2);
  ctx.fill(); ctx.stroke();
  // mouth open mid-scream
  ctx.fillStyle = "#7a1f1f";
  ctx.beginPath();
  ctx.moveTo(x + 38, y - 35);
  ctx.lineTo(x + 48, y - 38);
  ctx.lineTo(x + 47, y - 29);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  // bulging terrified eye
  ctx.fillStyle = "#fff";
  ctx.beginPath(); ctx.arc(x + 32, y - 38, 4, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = "#000";
  ctx.beginPath(); ctx.arc(x + 33.5, y - 38, 1.3, 0, Math.PI * 2); ctx.fill();
  // sprinting legs
  const leg = Math.sin(warner.gait) * 12;
  ctx.strokeStyle = "#6e4520";
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(x - 4, y - 16); ctx.lineTo(x - 4 + leg, GROUND_Y);
  ctx.moveTo(x + 7, y - 16); ctx.lineTo(x + 7 - leg, GROUND_Y);
  ctx.stroke();
  // speed lines behind it
  ctx.strokeStyle = "rgba(255,255,255,0.35)";
  ctx.lineWidth = 2;
  for (let i = 0; i < 3; i++) {
    ctx.beginPath();
    ctx.moveTo(x - 50 - i * 12, y - 18 - i * 8);
    ctx.lineTo(x - 72 - i * 12, y - 18 - i * 8);
    ctx.stroke();
  }
  // speech bubble: sized to fit whatever the dino is screaming
  const msg = warner.msg || "RUN!!";
  const fontPx = msg.length > 8 ? 13 : 19;
  ctx.font = "bold " + fontPx + "px 'Courier New', monospace";
  const halfW = Math.max(36, ctx.measureText(msg).width / 2 + 12);
  const bx = x + 28, by = y - 76 + Math.sin(frame * 0.3) * 2;
  ctx.fillStyle = "#fffdf2";
  ctx.strokeStyle = "#3a2218";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.roundRect(bx - halfW, by - 17, halfW * 2, 30, 8);
  ctx.fill(); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(bx - 6, by + 13);
  ctx.lineTo(bx - 1, by + 25);
  ctx.lineTo(bx + 8, by + 13);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = "#3a2218";
  ctx.beginPath();
  ctx.moveTo(bx - 6, by + 13); ctx.lineTo(bx - 1, by + 25); ctx.lineTo(bx + 8, by + 13);
  ctx.stroke();
  ctx.fillStyle = "#c41f0e";
  ctx.textAlign = "center";
  ctx.fillText(msg, bx, by + 5);
  ctx.textAlign = "left";
  ctx.restore();
}

function drawFloaters() {
  for (let i = floaters.length - 1; i >= 0; i--) {
    const f = floaters[i];
    f.y -= 0.8;
    f.life--;
    if (f.life <= 0) { floaters.splice(i, 1); continue; }
    ctx.globalAlpha = Math.min(1, f.life / 25);
    ctx.fillStyle = "#ffe27a";
    ctx.font = "bold 15px 'Courier New', monospace";
    ctx.textAlign = "center";
    ctx.fillText(f.txt, f.x, f.y);
  }
  ctx.globalAlpha = 1;
  ctx.textAlign = "left";
}

// ---------- intro story: mom & dad send their boy off ----------
function drawBubble(cx, cy, text) {
  ctx.save();
  ctx.font = "bold 16px 'Courier New', monospace";
  const w = ctx.measureText(text).width + 28;
  ctx.fillStyle = "#fffdf2";
  ctx.strokeStyle = "#3a2218";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.roundRect(cx - w / 2, cy - 16, w, 30, 8);
  ctx.fill(); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cx - 6, cy + 14);
  ctx.lineTo(cx, cy + 27);
  ctx.lineTo(cx + 9, cy + 14);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(cx - 6, cy + 14); ctx.lineTo(cx, cy + 27); ctx.lineTo(cx + 9, cy + 14);
  ctx.stroke();
  ctx.fillStyle = "#c41f0e";
  ctx.textAlign = "center";
  ctx.fillText(text, cx, cy + 6);
  ctx.textAlign = "left";
  ctx.restore();
}

function drawAdultRex(x, y, s) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(-s, s);   // dad faces left, toward his kid
  ctx.fillStyle = "#3f6b36";
  ctx.strokeStyle = "#27451f";
  ctx.lineWidth = 2;
  // body
  ctx.beginPath();
  ctx.ellipse(0, -34, 24, 18, -0.25, 0, Math.PI * 2);
  ctx.fill(); ctx.stroke();
  // tail
  ctx.beginPath();
  ctx.moveTo(-18, -40);
  ctx.lineTo(-58, -54);
  ctx.lineTo(-16, -26);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  // neck + head
  ctx.beginPath();
  ctx.moveTo(12, -44);
  ctx.quadraticCurveTo(24, -62, 22, -66);
  ctx.lineTo(34, -66);
  ctx.quadraticCurveTo(26, -40, 18, -36);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(34, -64, 17, 10, 0.12, 0, Math.PI * 2);
  ctx.fill(); ctx.stroke();
  // jaw open mid-shout
  ctx.fillStyle = "#7a1f1f";
  ctx.beginPath();
  ctx.moveTo(40, -64);
  ctx.lineTo(56, -66);
  ctx.lineTo(54, -52);
  ctx.lineTo(39, -57);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  // teeth
  ctx.fillStyle = "#fffbe8";
  for (let i = 0; i < 3; i++) {
    ctx.beginPath();
    ctx.moveTo(44 + i * 4, -65 + i);
    ctx.lineTo(46 + i * 4, -60 + i);
    ctx.lineTo(48 + i * 4, -66 + i);
    ctx.closePath(); ctx.fill();
  }
  // urgent eye + worried brow
  ctx.fillStyle = "#fff";
  ctx.beginPath(); ctx.arc(33, -68, 5, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = "#27451f"; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.fillStyle = "#000";
  ctx.beginPath(); ctx.arc(34.5, -68, 1.7, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = "#27451f"; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.moveTo(26, -76); ctx.lineTo(39, -73); ctx.stroke();
  // tiny arm
  ctx.lineWidth = 4;
  ctx.beginPath(); ctx.moveTo(14, -36); ctx.lineTo(22, -30); ctx.stroke();
  // standing legs
  ctx.lineWidth = 5;
  ctx.beginPath();
  ctx.moveTo(-6, -20); ctx.lineTo(-9, 0);
  ctx.moveTo(8, -20); ctx.lineTo(11, 0);
  ctx.stroke();
  ctx.restore();
}

function drawBrachiosaurus(x, y, s) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(-s, s);   // mom faces left too
  ctx.fillStyle = "#a3865a";
  ctx.strokeStyle = "#6e5836";
  ctx.lineWidth = 2.5;
  // tail
  ctx.beginPath();
  ctx.moveTo(-48, -72);
  ctx.quadraticCurveTo(-95, -78, -125, -38);
  ctx.quadraticCurveTo(-90, -58, -44, -48);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  // legs (four pillars)
  ctx.lineWidth = 11;
  ctx.strokeStyle = "#8a7048";
  ctx.beginPath();
  ctx.moveTo(-36, -44); ctx.lineTo(-38, 0);
  ctx.moveTo(-14, -42); ctx.lineTo(-14, 0);
  ctx.moveTo(16, -42); ctx.lineTo(16, 0);
  ctx.moveTo(38, -46); ctx.lineTo(42, 0);
  ctx.stroke();
  // body
  ctx.lineWidth = 2.5;
  ctx.strokeStyle = "#6e5836";
  ctx.beginPath();
  ctx.ellipse(0, -64, 60, 34, -0.06, 0, Math.PI * 2);
  ctx.fill(); ctx.stroke();
  // long neck rising
  ctx.beginPath();
  ctx.moveTo(28, -88);
  ctx.quadraticCurveTo(58, -130, 66, -182);
  ctx.lineTo(88, -178);
  ctx.quadraticCurveTo(72, -118, 48, -70);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  // small head
  ctx.beginPath();
  ctx.ellipse(80, -184, 15, 9, 0.25, 0, Math.PI * 2);
  ctx.fill(); ctx.stroke();
  // mouth open, calling out
  ctx.fillStyle = "#7a1f1f";
  ctx.beginPath();
  ctx.moveTo(90, -184);
  ctx.lineTo(101, -184);
  ctx.lineTo(97, -176);
  ctx.lineTo(89, -179);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  // gentle worried eye + brow
  ctx.fillStyle = "#fff";
  ctx.beginPath(); ctx.arc(78, -187, 4.2, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = "#6e5836"; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.fillStyle = "#000";
  ctx.beginPath(); ctx.arc(79.2, -187, 1.4, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = "#6e5836"; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(72, -194); ctx.lineTo(83, -192); ctx.stroke();
  ctx.restore();
}

function drawFamily(off) {
  drawBrachiosaurus(520 - off, GROUND_Y, 1);
  drawAdultRex(310 - off, GROUND_Y, 1.75);
}

function drawStory() {
  drawFamily(0);
  const t = storyTimer;
  if (t > 12 && t < 170) drawBubble(250, 178, "SON, THE SKY IS FALLING!");
  if (t >= 170) drawBubble(430, 128, "RUN AND SAVE YOURSELF!");
  if (t > 230 && Math.floor(t / 28) % 2 === 0) {
    ctx.textAlign = "center";
    ctx.fillStyle = "#ffd9a0";
    ctx.font = "bold 17px 'Courier New', monospace";
    ctx.fillText("Press SPACE to run!", W / 2, H - 26);
    ctx.textAlign = "left";
  }
}

// ---------- HUD / screens ----------
function drawHUD() {
  ctx.fillStyle = "#fff3d6";
  ctx.font = "bold 20px 'Courier New', monospace";
  ctx.textAlign = "right";
  ctx.fillText(String(Math.floor(score)).padStart(6, "0"), W - 20, 34);
  ctx.font = "13px 'Courier New', monospace";
  ctx.fillText("BEST " + String(Math.floor(best)).padStart(6, "0"), W - 20, 54);
  // music indicator (M to toggle)
  ctx.font = "12px 'Courier New', monospace";
  ctx.fillStyle = music.enabled ? "#9bdc6a" : "rgba(255,243,214,0.4)";
  ctx.fillText(music.enabled ? "♪ MUSIC" : "♪ MUTED (M)", W - 20, 72);
  if (state === STATE.PLAYING || state === STATE.DEAD) {
    ctx.textAlign = "left";
    const mm = Math.floor(elapsed / 60), ss = Math.floor(elapsed % 60);
    ctx.font = "bold 16px 'Courier New', monospace";
    ctx.fillText("⏱ " + mm + ":" + String(ss).padStart(2, "0"), 20, 34);
    ctx.fillStyle = level >= 2 ? "#7ec8e3" : "#ffd9a0";
    ctx.fillText("STAGE " + level + " " + (LEVEL_NAMES[level] || ""), 20, 56);
  }
  ctx.textAlign = "left";

  // progress to safety
  if (state === STATE.PLAYING) {
    const prog = Math.min(1, elapsed / WIN_TIME);
    ctx.fillStyle = "rgba(0,0,0,0.4)";
    ctx.fillRect(W / 2 - 110, 16, 220, 9);
    ctx.fillStyle = "#9bdc6a";
    ctx.fillRect(W / 2 - 110, 16, 220 * prog, 9);
    ctx.strokeStyle = "rgba(255,217,160,0.8)";
    ctx.lineWidth = 1;
    ctx.strokeRect(W / 2 - 110.5, 15.5, 221, 10);
    ctx.font = "12px 'Courier New', monospace";
    ctx.fillStyle = "#ffd9a0";
    ctx.textAlign = "center";
    ctx.fillText("🦖", W / 2 - 110 + 220 * prog, 13);
    ctx.fillText(level >= 3 ? "🕳 THE BURROW" : level >= 2 ? "🏔 HIGH GROUND" : "🏔 SAFETY", W / 2 + 140, 26);
    ctx.textAlign = "left";
  }

  // shield charges remaining
  if (state === STATE.PLAYING && shield > 0) {
    ctx.font = "bold 14px 'Courier New', monospace";
    ctx.fillStyle = "#9bff5a";
    ctx.textAlign = "center";
    ctx.fillText("★ SHIELD " + "●".repeat(shield) + "○".repeat(SHIELD_MAX - shield), W / 2, 46);
    ctx.textAlign = "left";
  }

  // danger-up banner (the every-20s difficulty step)
  if (stageFlash > 0) {
    stageFlash--;
    const a = Math.min(1, stageFlash / 30) * (0.6 + 0.4 * Math.sin(frame * 0.3));
    ctx.globalAlpha = a;
    ctx.textAlign = "center";
    ctx.fillStyle = "#ff5a2a";
    ctx.font = "bold 28px 'Courier New', monospace";
    ctx.fillText("⚠ DANGER RISING ⚠", W / 2, 70);
    ctx.font = "14px 'Courier New', monospace";
    ctx.fillStyle = "#ffd9a0";
    ctx.fillText(stageMessage(stage), W / 2, 94);
    ctx.textAlign = "left";
    ctx.globalAlpha = 1;
  }

  // big scenario-change banner when a new stage begins
  if (levelFlash > 0) {
    levelFlash--;
    ctx.globalAlpha = Math.min(1, levelFlash / 40);
    ctx.textAlign = "center";
    ctx.fillStyle = "#7ec8e3";
    ctx.font = "bold 36px 'Courier New', monospace";
    ctx.fillText("STAGE " + level, W / 2, H / 2 - 14);
    ctx.fillStyle = "#e8f4ff";
    ctx.font = "bold 22px 'Courier New', monospace";
    ctx.fillText((LEVEL_NAMES[level] || "").replace("· ", ""), W / 2, H / 2 + 16);
    ctx.font = "14px 'Courier New', monospace";
    ctx.fillStyle = "#ffd9a0";
    ctx.fillText(level === 3 ? "THE WORLD IS FREEZING — REACH THE BURROW!" : "A TSUNAMI IS COMING — REACH HIGH GROUND!", W / 2, H / 2 + 44);
    ctx.textAlign = "left";
    ctx.globalAlpha = 1;
  }
}

function stageMessage(s) {
  const msgs = [
    "",
    "",
    "The ground trembles harder…",
    "Debris is falling in pairs!",
    "METEOR SHOWERS INCOMING!",
    "The sky itself is burning…",
    "There is no escaping fate."
  ];
  return msgs[Math.min(s, msgs.length - 1)];
}

function drawCenterText(lines) {
  ctx.fillStyle = "rgba(0,0,0,0.55)";
  ctx.fillRect(W / 2 - 250, H / 2 - 90, 500, 150);
  ctx.strokeStyle = "#ff8c2e";
  ctx.lineWidth = 2;
  ctx.strokeRect(W / 2 - 250, H / 2 - 90, 500, 150);
  ctx.textAlign = "center";
  ctx.fillStyle = "#ffd9a0";
  lines.forEach((l, i) => {
    ctx.font = i === 0 ? "bold 26px 'Courier New', monospace" : "15px 'Courier New', monospace";
    ctx.fillText(l, W / 2, H / 2 - 45 + i * 32);
  });
  ctx.textAlign = "left";
}

// ---------- flow ----------
function advance() {
  music.start();   // first user gesture — kick off the score
  if (state === STATE.TITLE) {
    // first the story: mom & dad send you off
    state = STATE.STORY;
    storyTimer = 0;
    beep(520, 0.1, "square");
  } else if (state === STATE.STORY) {
    if (storyTimer > 45) startGame();
  } else if (state === STATE.WIN) {
    if (winTimer > 100) {
      state = STATE.TITLE;
      beep(440, 0.1, "square");
    }
  } else if (state === STATE.DEAD) {
    startGame();   // retries skip straight back into the run
  }
}

function startGame() {
  if (state === STATE.PLAYING) return;
  // leaving the story scene: mom & dad stay behind as the world scrolls
  farewell = state === STATE.STORY ? { off: 0 } : null;
  state = STATE.PLAYING;
  score = 0;
  speed = 6;
  elapsed = 0;
  stage = 1;
  stageFlash = 0;
  level = 1;
  levelFlash = 0;
  // safety bar starts empty — a panicked dino bursts in screaming the warning
  warner = { x: -110, gait: 0, msg: "RUN TO THE SAFE ZONE" };
  lightning = 0;
  debris = [];
  particles.length = 0;
  floaters.length = 0;
  nearMisses = 0;
  winTimer = 0;
  spawnTimer = 60;
  rocksSinceGrass = 0;
  shield = 0;
  rex.reset();
  beep(440, 0.1, "square");
}

function advanceLevel() {
  level++;
  elapsed = 0;                       // safety bar refills for the new stage
  stage = (level - 1) * 3 + 1;       // difficulty carries forward, not reset
  debris = [];
  particles.length = 0;
  spawnTimer = 70;
  rocksSinceGrass = 0;
  stageFlash = 0;
  levelFlash = 150;                  // big "STAGE 2" announcement
  shake = Math.max(shake, 16);
  // a panicked dino bolts past pointing the way to the next safe zone
  warner = { x: -110, gait: 0, msg: level === 3 ? "TO THE BURROW!" : "TO THE COAST!" };
  beep(523, 0.15, "square", 0.1);
  setTimeout(() => beep(659, 0.15, "square", 0.1), 130);
  setTimeout(() => beep(784, 0.3, "square", 0.1), 280);
}

function winGame() {
  state = STATE.WIN;
  winTimer = 0;
  debris = [];
  farewell = null;
  shake = 22;          // the asteroid hits behind you — but you made it out
  beep(523, 0.15, "square", 0.1);
  setTimeout(() => beep(659, 0.15, "square", 0.1), 150);
  setTimeout(() => beep(784, 0.35, "square", 0.1), 300);
  if (score > best) {
    best = Math.floor(score);
    localStorage.setItem("trexBest", best);
  }
}

function gameOver() {
  state = STATE.DEAD;
  burst(rex.x, rex.y - 30, 40, "#9bdc6a");
  shake = 16;
  beep(120, 0.5, "sawtooth", 0.14);
  if (score > best) {
    best = Math.floor(score);
    localStorage.setItem("trexBest", best);
  }
}

// ---------- main loop ----------
function loop() {
  requestAnimationFrame(loop);

  // show the pause button only mid-run; freeze everything while paused
  pauseBtn.style.display = (state === STATE.PLAYING || paused) ? "inline-block" : "none";
  if (paused) return;   // overlay was drawn once on pause; scene stays frozen

  frame++;

  // a touch held past the gesture window with no down-swipe is a held jump
  if (touch && !touch.mode && performance.now() - touch.t0 > 70) {
    touch.mode = "jump";
    jumpQueued = true;
    keys.jump = true;
  }

  ctx.save();
  if (shake > 0) {
    ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
    shake *= 0.88;
    if (shake < 0.4) shake = 0;
  }

  drawBackground(frame);

  if (state === STATE.STORY) {
    storyTimer++;
    if (storyTimer === 12) beep(170, 0.18, "square", 0.07);    // dad's bellow
    if (storyTimer === 170) beep(320, 0.2, "triangle", 0.07);  // mom's call
    drawStory();
  }

  if (state === STATE.PLAYING) {
    elapsed += 1 / 60;
    if (elapsed >= WIN_TIME) {
      if (level < LEVELS) advanceLevel();   // cleared this stage — on to the next scene
      else winGame();                       // cleared the final stage — you escaped
    }
  }

  if (state === STATE.WIN) winTimer++;

  if (state === STATE.PLAYING) {
    const newStage = (level - 1) * 3 + 1 + Math.floor(elapsed / 20);
    if (newStage > stage) {
      stage = newStage;
      stageFlash = 110;
      shake = Math.max(shake, 8);
      beep(180, 0.25, "sawtooth", 0.1);
      beep(240, 0.35, "square", 0.07);
      // a terrified messenger dino bursts in from behind, screaming
      warner = { x: -110, gait: 0, msg: "RUN!!" };
      beep(950, 0.1, "square", 0.08);
      setTimeout(() => beep(760, 0.14, "square", 0.08), 110);
    }
    // speed climbs steadily with time survived, gently boosted by stage
    speed = Math.min(19, 6 + elapsed * 0.12 + stage * 0.5);
    score += speed * 0.06;
    // mom & dad fall away behind you
    if (farewell) {
      farewell.off += speed;
      if (farewell.off > W + 300) farewell = null;
      else {
        drawFamily(farewell.off);
        if (farewell.off < 240) drawBubble(430 - farewell.off, 128, "DON'T LOOK BACK!");
      }
    }
    rex.update();
    updateWarner();
    updateDebris();
    if (frame % 7 === 0) burst(rex.x - 20, GROUND_Y, 1, "rgba(120,80,40,0.6)"); // dust kick
  }

  drawDebris();
  rex.draw();
  drawWarner();
  drawFloaters();
  drawAsh(frame);

  // faint vignette pulsing from the danger side (warm on land, cold at sea)
  const hazeCol = level >= 3 ? "150,180,210" : level >= 2 ? "40,90,150" : "255,90,20";
  const haze = ctx.createLinearGradient(0, 0, W * 0.45, 0);
  haze.addColorStop(0, "rgba(" + hazeCol + "," + (0.08 + 0.04 * Math.sin(frame * 0.05)) + ")");
  haze.addColorStop(1, "rgba(" + hazeCol + ",0)");
  ctx.fillStyle = haze;
  ctx.fillRect(0, 0, W * 0.45, H);

  drawHUD();

  if (state === STATE.TITLE) {
    drawCenterText([
      "ESCAPE FROM CHICXULUB",
      "66 million years ago, Yucatán Peninsula…",
      "Survive 3 stages — badlands, coast, then the long night.",
      "Press SPACE or tap to start"
    ]);
  } else if (state === STATE.WIN) {
    drawCenterText([
      "YOU SURVIVED!",
      "You outran the blast, the tsunami, and the freezing dark.",
      "Score: " + Math.floor(score) + "   Best: " + Math.floor(best),
      "Mom & Dad would be proud · SPACE for title"
    ]);
    // white-hot impact flash fading out as the dust settles
    if (winTimer < 55) {
      ctx.fillStyle = "rgba(255,246,224," + (1 - winTimer / 55) + ")";
      ctx.fillRect(0, 0, W, H);
    }
  } else if (state === STATE.DEAD) {
    drawCenterText([
      "EXTINCT",
      "Score: " + Math.floor(score) + "   Best: " + Math.floor(best),
      "The asteroid wins this round.",
      "Press SPACE or tap to try again"
    ]);
  }

  ctx.restore();
}

loop();
})();
</script>
</body>
</html>
